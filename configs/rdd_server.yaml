decomposer: ['rdd', 'uvd']
preprocessor: "liv"
# GPU the encoder is loaded on. Note that scripts/eval/serve_rdd.sh starts uvicorn
# with 8 workers, and each worker loads its own copy of the encoder onto this
# device — lower the worker count if you are short on VRAM.
device: "cuda:0"
chunk_size: 64
views:
  - "front_rgb"
debug: false
max_len: 100

alpha: 1.0

# # clean kithen
# vec_database_path: "data/vec_databases/clean_kitchen/train"
# mode: "ood" # * will override alpha to 0.0
# beta: 0.1

# clean kithen
vec_database_path: "data/vec_databases/franka/train"
mode: "ood" # * will override alpha to 0.0
beta: 0.1

